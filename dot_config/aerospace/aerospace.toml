# =============================================================================
# AeroSpace Config — Omarchy-Inspired
# =============================================================================
# This config mirrors the Omarchy (Hyprland) tiling defaults as closely as
# macOS and AeroSpace allow.
#
# KEY MAPPING PHILOSOPHY:
#   Omarchy SUPER  →  alt       (primary modifier)
#   Omarchy SHIFT  →  shift
#   Omarchy CTRL   →  ctrl
#   Omarchy ALT    →  cmd       (since alt is already taken as primary)
#
# Some Omarchy features have no AeroSpace equivalent (animations, blur,
# shadows, window groups/tabs, scratchpad, mouse bindings, pop-out/pin).
# Those are noted with comments where applicable.
#
# Place this file at: ~/.aerospace.toml
#   or: ~/.config/aerospace/aerospace.toml
# =============================================================================

config-version = 2

# ---------------------------------------------------------------------------
# General / Layout
# ---------------------------------------------------------------------------
# Omarchy uses Hyprland's "dwindle" layout (binary space partition).
# AeroSpace's "tiles" is the closest equivalent.
default-root-container-layout = 'tiles'

# Omarchy: force_split = 2 (always split right)
# AeroSpace: 'auto' means wide monitors get horizontal, tall get vertical.
default-root-container-orientation = 'auto'

# Omarchy: pseudotile = true, preserve_split = true
# AeroSpace normalizations approximate this behavior.
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Omarchy: accordion not used by default, but available.
# This padding controls the visual hint in accordion mode.
accordion-padding = 30

# ---------------------------------------------------------------------------
# Start at login
# ---------------------------------------------------------------------------
start-at-login = true

# Automatically unhide apps when switching to their workspace
automatically-unhide-macos-hidden-apps = true

# ---------------------------------------------------------------------------
# After startup: optionally start JankyBorders for window border indicators
# ---------------------------------------------------------------------------
# Omarchy has colored borders: active = cyan→green gradient, inactive = gray.
# Uncomment and install JankyBorders (brew install FelixKratz/formulae/borders)
# to approximate this.
#
# after-startup-command = [
#     'exec-and-forget borders active_color=0xee33ccff inactive_color=0xaa595959 width=2.0',
# ]

# ---------------------------------------------------------------------------
# Callbacks
# ---------------------------------------------------------------------------
# Move mouse to center of focused window (similar to Hyprland behavior)
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# ---------------------------------------------------------------------------
# Key mapping
# ---------------------------------------------------------------------------
key-mapping.preset = 'qwerty'

# ---------------------------------------------------------------------------
# Gaps
# ---------------------------------------------------------------------------
# Omarchy defaults:
#   gaps_in  = 5   (between windows)
#   gaps_out = 10  (between windows and screen edges)
[gaps]
inner.horizontal = 5
inner.vertical   = 5
outer.left       = 10
outer.right      = 10
outer.top        = 10
outer.bottom     = 10

# ===========================================================================
# MAIN MODE BINDINGS
# ===========================================================================
[mode.main.binding]

# ---------------------------------------------------------------------------
# Window Operations (from Omarchy tiling-v2.conf)
# ---------------------------------------------------------------------------
# SUPER + W → Close window
alt-w = 'close'

# SUPER + T → Toggle floating/tiling
alt-t = 'layout floating tiling'

# SUPER + F → Fullscreen
alt-f = 'fullscreen'

# SUPER + J → Toggle split direction (Omarchy: togglesplit / dwindle)
# Moved to alt-slash below; alt-j used for vim-style focus instead

# SUPER + ALT + F → Full width (Omarchy: fullscreen 1 / maximize within tiling)
# No direct equivalent; fullscreen is the closest
alt-cmd-f = 'fullscreen'

# ---------------------------------------------------------------------------
# Focus Navigation (arrow keys, matching Omarchy defaults)
# ---------------------------------------------------------------------------
# SUPER + Arrow → Move focus
alt-left  = 'focus left'
alt-right = 'focus right'
alt-up    = 'focus up'
alt-down  = 'focus down'

# Also support h/j/k/l for vim-style navigation (popular Omarchy community mod)
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# ALT + TAB → Cycle windows (Omarchy: cyclenext)
# Note: macOS cmd-tab handles app switching; this cycles within workspace
# alt-tab is not bindable in AeroSpace; use a different combo if desired

# ---------------------------------------------------------------------------
# Window Swapping / Moving
# ---------------------------------------------------------------------------
# SUPER + SHIFT + Arrow → Swap window in direction
alt-shift-left  = 'move left'
alt-shift-right = 'move right'
alt-shift-up    = 'move up'
alt-shift-down  = 'move down'

# Vim-style move
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# ---------------------------------------------------------------------------
# Window Resizing
# ---------------------------------------------------------------------------
# SUPER + minus/equal → Resize (Omarchy: resizeactive ±100 0)
alt-minus = 'resize smart -50'
alt-equal = 'resize smart +50'

# Enter resize mode for finer control (see resize mode below)
alt-r = 'mode resize'

# ---------------------------------------------------------------------------
# Workspace Navigation (10 workspaces, matching Omarchy)
# ---------------------------------------------------------------------------
# SUPER + [1-0] → Switch to workspace
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'
alt-0 = 'workspace 10'

# SUPER + TAB / SUPER + SHIFT + TAB → Next/Previous workspace
alt-tab       = 'workspace next'
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

# ---------------------------------------------------------------------------
# Move Window to Workspace (and follow)
# ---------------------------------------------------------------------------
# SUPER + SHIFT + [1-0] → Move window to workspace (Omarchy: movetoworkspace)
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-7 = 'move-node-to-workspace 7'
alt-shift-8 = 'move-node-to-workspace 8'
alt-shift-9 = 'move-node-to-workspace 9'
alt-shift-0 = 'move-node-to-workspace 10'

# ---------------------------------------------------------------------------
# Layout Toggles
# ---------------------------------------------------------------------------
# Toggle between tiling layouts (tiles ↔ accordion)
alt-comma = 'layout accordion horizontal vertical'
alt-slash = 'layout tiles horizontal vertical'

# ---------------------------------------------------------------------------
# Application Launchers (Omarchy-style hotkeys)
# ---------------------------------------------------------------------------
# SUPER + RETURN → Terminal
alt-enter = 'exec-and-forget open -a Ghostty || open -a Terminal'

# SUPER + SHIFT + B → Browser
alt-shift-b = 'exec-and-forget open -a Zen || open -a Safari'

# SUPER + SHIFT + F → File manager
alt-shift-f = 'exec-and-forget open -a Finder'

# SUPER + SHIFT + N → Editor (Neovim in terminal)
alt-shift-n = '''exec-and-forget osascript -e '
tell application "Ghostty"
    activate
end tell' '''

# SUPER + SHIFT + M → Music
alt-shift-m = 'exec-and-forget open -a Spotify || open -a Music'

# SUPER + SHIFT + slash → Password manager
alt-shift-slash = 'exec-and-forget open -a "1Password"'

# ---------------------------------------------------------------------------
# Service Mode (for AeroSpace management)
# ---------------------------------------------------------------------------
alt-shift-semicolon = 'mode service'

# ===========================================================================
# RESIZE MODE (enter with alt-r, exit with escape)
# ===========================================================================
# Omarchy resize: SUPER + minus/equal and SUPER + SHIFT + minus/equal
[mode.resize.binding]
h     = 'resize width -50'
l     = 'resize width +50'
k     = 'resize height +50'
j     = 'resize height -50'
left  = 'resize width -50'
right = 'resize width +50'
up    = 'resize height +50'
down  = 'resize height -50'

minus = 'resize smart -50'
equal = 'resize smart +50'

enter  = 'mode main'
esc    = 'mode main'

# ===========================================================================
# SERVICE MODE (AeroSpace management)
# ===========================================================================
[mode.service.binding]
esc             = ['reload-config', 'mode main']
r               = ['flatten-workspace-tree', 'mode main']
f               = ['layout floating tiling', 'mode main']
backspace       = ['close-all-windows-but-current', 'mode main']

# Toggle between tile layouts
alt-shift-left  = ['join-with left',  'mode main']
alt-shift-right = ['join-with right', 'mode main']
alt-shift-up    = ['join-with up',    'mode main']
alt-shift-down  = ['join-with down',  'mode main']

# ===========================================================================
# Application-Specific Rules (matching Omarchy window rules)
# ===========================================================================

# --- Password managers: float by default (Omarchy: floating-window tag) ---
[[on-window-detected]]
if.app-id = 'com.1password.1password'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.bitwarden.desktop'
run = 'layout floating'

# --- Steam: float by default (Omarchy: float on) ---
[[on-window-detected]]
if.app-id = 'com.valvesoftware.steam'
run = 'layout floating'

# --- System Preferences / Settings: float ---
[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.SystemPreferences'
run = 'layout floating'

# --- Calculator: float ---
[[on-window-detected]]
if.app-id = 'com.apple.calculator'
run = 'layout floating'

# --- Activity Monitor: float (Omarchy: SUPER + CTRL + T starts as floating) ---
[[on-window-detected]]
if.app-id = 'com.apple.ActivityMonitor'
run = 'layout floating'

# --- Zoom: float ---
[[on-window-detected]]
if.app-id = 'us.zoom.xos'
run = 'layout floating'

# ===========================================================================
# Workspace Assignments
# ===========================================================================

# --- Workspace 1: Terminal & Browser ---
[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
run = 'move-node-to-workspace 1'

[[on-window-detected]]
if.app-id = 'app.zen-browser.zen'
run = 'move-node-to-workspace 1'

# --- Workspace 2: Communication ---
[[on-window-detected]]
if.app-id = 'com.apple.MobileSMS'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
run = 'move-node-to-workspace 2'

# --- Workspace 3: Notes & Music ---
[[on-window-detected]]
if.app-id = 'com.apple.Notes'
run = 'move-node-to-workspace 3'

[[on-window-detected]]
if.app-id = 'com.spotify.client'
run = 'move-node-to-workspace 3'
